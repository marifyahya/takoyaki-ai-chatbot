<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abang Takoyaki 🐙</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐙</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Animated Background Elements -->
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container glass-panel">
    <!-- Chat Header -->
    <header class="chat-header">
      <div class="avatar">
        <img src="profile.png" alt="Abang Takoyaki" />
      </div>
      <div class="header-info">
        <h1>Abang Takoyaki</h1>
        <p class="status">Online • Siap melayani</p>
      </div>
    </header>

    <!-- Chat Messages -->
    <div id="chat-box" class="chat-box"></div>

    <!-- Chat Input Form -->
    <form id="chat-form" class="chat-input-area">
      <input type="text" id="user-input" placeholder="Tulis pesanan atau tanya menu..." autocomplete="off" required autofocus />
      <button type="submit" class="send-btn" title="Kirim">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <script src="script.js"></script>
</body>

</html>
